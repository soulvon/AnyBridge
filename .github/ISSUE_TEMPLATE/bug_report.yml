name: Bug report
description: Report reproducible behavior that looks wrong.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Remove API keys, tokens, account emails, local certificates, and captured payloads before posting.
  - type: input
    id: version
    attributes:
      label: AnyBridge version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 11
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target tool
      placeholder: Windsurf 1.108.x, Codex, Claude Code, etc.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Describe the smallest reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Paste only logs with secrets removed.
      render: text
