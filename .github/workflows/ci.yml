name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev libnm-dev xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: npm ci

      - name: Check UI
        run: npm run check:ui

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sidecar for Cargo check
        shell: bash
        run: |
          set -euo pipefail
          HOST="$(rustc -vV | awk '/^host: / {print $2}')"
          python scripts/build/build_sidecar_plain.py --platform "$HOST"

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
