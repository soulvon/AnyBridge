name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  prepare-release:
    name: Prepare source draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.app_version.outputs.VERSION }}
      release_id: ${{ steps.source_release.outputs.release_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          VERSION="$(node -e "console.log(require('./package.json').version)")"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        shell: bash
        run: |
          node scripts/release/extract_changelog_section.cjs \
            --version "${{ steps.app_version.outputs.VERSION }}" \
            --output release-notes.md

      - name: Ensure source draft release
        id: source_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.app_version.outputs.VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Source release already exists: $TAG"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "IDE BYOK v${VERSION}" \
              --notes-file release-notes.md \
              --draft \
              --verify-tag
          fi
          RELEASE_ID="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json id --jq '.id')"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

  release:
    name: Build & Publish Multi-Platform Release
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: "windows-latest"
            args: ""
          # macOS Apple Silicon
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          # macOS Intel
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          # Linux x86_64
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate updater signing secret
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::Missing GitHub Secret TAURI_SIGNING_PRIVATE_KEY. Add the contents of tauri-sign.key before running release builds."
            exit 1
          fi

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && (contains(matrix.args, 'aarch64') && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Sidecar Binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src-tauri/binaries
          cd sidecar
          npm ci
          export PKG_CACHE_PATH="$(pwd)/../.pkg-cache"
          mkdir -p "${PKG_CACHE_PATH}/v3.6"
          
          # 针对不同构建矩阵选择对应的打包 Targets 及输出文件名
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            PKG_TARGET="node22-win-x64"
            PKG_BASE="node-v22.22.3-win-x64"
            OUTPUT_NAME="ide-byok-proxy-x86_64-pc-windows-msvc.exe"
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            if [[ "${{ matrix.args }}" == *"aarch64"* ]]; then
              PKG_TARGET="node22-macos-arm64"
              PKG_BASE="node-v22.22.3-macos-arm64"
              OUTPUT_NAME="ide-byok-proxy-aarch64-apple-darwin"
            else
              PKG_TARGET="node22-macos-x64"
              PKG_BASE="node-v22.22.3-macos-x64"
              OUTPUT_NAME="ide-byok-proxy-x86_64-apple-darwin"
            fi
          else
            PKG_TARGET="node22-linux-x64"
            PKG_BASE="node-v22.22.3-linux-x64"
            OUTPUT_NAME="ide-byok-proxy-x86_64-unknown-linux-gnu"
          fi
          
          echo "Prefetching pkg base binary: $PKG_BASE"
          curl -L --fail --retry 5 --retry-delay 5 \
            "https://github.com/yao-pkg/pkg-fetch/releases/download/v3.6/${PKG_BASE}" \
            -o "${PKG_CACHE_PATH}/v3.6/${PKG_BASE}"
          chmod +x "${PKG_CACHE_PATH}/v3.6/${PKG_BASE}"

          echo "Building Sidecar Proxy: $PKG_TARGET -> $OUTPUT_NAME"
          ./node_modules/.bin/pkg proxy-entry.js --targets "$PKG_TARGET" --output "../src-tauri/binaries/$OUTPUT_NAME"
          
          # 非 Windows 平台赋予可执行权限，规避 Tauri 打包时的权限限制
          if [ "${{ matrix.platform }}" != "windows-latest" ]; then
            chmod +x "../src-tauri/binaries/$OUTPUT_NAME"
          fi

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: "v${{ needs.prepare-release.outputs.version }}"
          releaseName: "IDE BYOK v${{ needs.prepare-release.outputs.version }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  rebuild-latest-json:
    name: Rebuild latest.json & Sync to public release repo
    needs:
      - prepare-release
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SOURCE_REPO: ${{ github.repository }}
      TARGET_REPO: soulvon/IDE-BYOK-Release
      VERSION: ${{ needs.prepare-release.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download source release assets (retry)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          TAG="v${VERSION}"
          downloaded="false"
          for i in $(seq 1 30); do
            if gh release download "$TAG" --repo "$SOURCE_REPO" --dir release-assets --pattern "*" --clobber; then
              downloaded="true"
              echo "Downloaded release assets from $SOURCE_REPO:$TAG"
              break
            fi
            echo "Release assets not ready yet (attempt $i/30). Sleeping 10s..."
            sleep 10
          done
          if [ "$downloaded" != "true" ]; then
            echo "Failed to download release assets from $SOURCE_REPO:$TAG after retries."
            exit 1
          fi

      - name: Read source release metadata
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "v${VERSION}" --repo "$SOURCE_REPO" --json body --jq '.body' > release-notes.md
          PUBLISHED_AT="$(gh release view "v${VERSION}" --repo "$SOURCE_REPO" --json publishedAt,createdAt --jq '.publishedAt // .createdAt')"
          if [ -z "${PUBLISHED_AT}" ] || [ "${PUBLISHED_AT}" = "null" ]; then
            PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          fi
          echo "PUBLISHED_AT=${PUBLISHED_AT}" >> "$GITHUB_ENV"

      - name: Build merged latest.json for public repo
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release/build_merged_latest_json.cjs \
            --version "${VERSION}" \
            --repo "${TARGET_REPO}" \
            --assets-dir "release-assets" \
            --notes-file "release-notes.md" \
            --published-at "${PUBLISHED_AT}" \
            --output "latest.json"

      - name: Ensure target release exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          if gh release view "$TAG" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "Target release already exists: $TARGET_REPO:$TAG"
          else
            gh release create "$TAG" --repo "$TARGET_REPO" --title "IDE BYOK v${VERSION}" --notes-file release-notes.md --draft
          fi

      - name: Upload assets to target release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          gh release upload "$TAG" --repo "$TARGET_REPO" release-assets/* --clobber
          gh release upload "$TAG" --repo "$TARGET_REPO" latest.json --clobber

      - name: Publish target release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release edit "v${VERSION}" --repo "$TARGET_REPO" --draft=false --prerelease=false --latest



