
  <!-- Kite 插件安装选择 -->
  <div id="kite-plugin-modal" class="modal-overlay" data-action="closeKitePluginModal" data-only-self>
    <div class="modal-container kite-plugin-modal">
      <div class="modal-header kite-plugin-modal-header">
        <div class="modal-title kite-plugin-title">
          <span class="kite-plugin-mark">Kite</span>
          <span>安装 Kite 插件</span>
        </div>
        <button type="button" class="modal-close-icon kite-plugin-close"
 aria-label="关闭 Kite 插件安装弹窗" data-action="closeKitePluginModal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <div class="modal-body kite-plugin-body">
        <p>
          为 <strong id="kite-plugin-platform-label">Devin</strong> 安装 Kite 增强插件。安装会下载 GitHub latest release
          中的 <code>.vsix</code> 文件，并调用对应 IDE 的扩展安装命令。
        </p>
        <div class="kite-plugin-choice-grid">
          <button type="button" class="kite-plugin-choice kite-plugin-choice-install" id="kite-plugin-install-btn"
 data-action="installKitePlugin">
            <span class="kite-plugin-choice-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3v12"></path>
                <path d="m7 10 5 5 5-5"></path>
                <path d="M5 21h14"></path>
              </svg>
            </span>
            <span>
              <strong>一键安装</strong>
              <small>直接安装到当前平台</small>
            </span>
          </button>
          <a class="kite-plugin-choice kite-plugin-choice-project" href="https://github.com/soulvon/Kite"
 target="_blank" rel="noopener noreferrer" data-action="closeKitePluginModal">
            <span class="kite-plugin-choice-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 17 17 7"></path>
                <path d="M8 7h9v9"></path>
                <path d="M5 5v14h14"></path>
              </svg>
            </span>
            <span>
              <strong>项目页面</strong>
              <small>查看源码和说明</small>
            </span>
          </a>
        </div>
        <div class="kite-plugin-note">
          如果安装失败，AnyBridge 会显示 GitHub 下载或 IDE 安装命令的原始错误，方便继续排查。
        </div>
      </div>
    </div>
  </div>
