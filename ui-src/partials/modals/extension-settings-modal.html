  
        <div id="extension-settings-modal" class="modal-overlay" role="dialog" aria-modal="true"
          aria-labelledby="extensionSettingsTitle">
          <div class="modal-container extension-settings-modal">
            <div class="modal-header extension-settings-header">
              <div class="modal-title">
                <span class="modal-icon" style="color: var(--accent);">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                  </svg>
                </span>
                <span id="extensionSettingsTitle">扩展设置</span>
              </div>
              <button type="button" class="modal-close-icon" aria-label="关闭扩展设置" data-action="closeExtensionSettings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M18 6 6 18"></path>
                  <path d="m6 6 12 12"></path>
                </svg>
              </button>
            </div>
            <div class="modal-body extension-settings-body">
              <div class="extension-settings-panel" id="extensionSettingsPanel">
                <div class="extension-settings-row">
                  <div class="extension-settings-label">
                    <strong>刷新状态</strong>
                    <span>重新检测所有扩展的运行状态</span>
                  </div>
                  <button type="button" class="btn-ghost" data-action="refreshExtensionStatuses">刷新</button>
                </div>
                <div class="extension-settings-row">
                  <div class="extension-settings-label">
                    <strong>扩展日志</strong>
                    <span>查看安装、启动、更新等操作记录</span>
                  </div>
                  <button type="button" class="btn-ghost" data-action="openExtensionLogsFromSettings">打开</button>
                </div>
                <p class="extension-settings-hint">各扩展的安装目录、版本切换等专属配置，请在对应扩展卡片的「设置」中管理。</p>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="modal-btn modal-btn-confirm" data-action="closeExtensionSettings">完成</button>
            </div>
          </div>
        </div>
