  <!-- 模型检测项选择 -->
  <div id="eval-check-modal" class="modal-overlay">
    <div class="modal-container eval-check-modal-container">
      <div class="modal-header">
        <div class="modal-title">
          <span class="modal-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"></path>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
          </span>
          检测项
        </div>
      </div>
      <div class="modal-body eval-check-modal-body">
        <div class="eval-check-modal-toolbar">
          <div class="eval-check-modal-note">基础协议、结构、签名、模型回显会固定执行；这里选择附加检测项。</div>
          <div class="eval-check-modal-actions">
            <button type="button" class="btn-ghost" onclick="setAllEvalChecks(true)">全选</button>
            <button type="button" class="btn-ghost" onclick="setAllEvalChecks(false)">清空</button>
          </div>
        </div>
        <div class="eval-check-picker-grid" id="eval-check-picker-grid"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="modal-btn modal-btn-cancel" onclick="closeEvalCheckModal()">取消</button>
        <button type="button" class="modal-btn modal-btn-confirm" onclick="closeEvalCheckModal()">完成</button>
      </div>
    </div>
  </div>
