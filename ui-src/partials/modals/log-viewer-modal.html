
  <!-- 日志查看器 -->
  <div id="log-viewer-modal" class="modal-overlay log-viewer-overlay">
    <div class="modal-container log-viewer-modal">
      <div class="log-viewer-header">
        <div>
          <div class="log-viewer-kicker">Runtime Logs</div>
          <h2>代理日志查看器</h2>
          <p>按级别、关键词和时间顺序查看 AnyBridge 运行日志。</p>
        </div>
        <button type="button" class="modal-close-icon" aria-label="关闭日志查看器" data-action="closeLogViewerModal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <div class="log-viewer-filterbar">
        <label class="log-viewer-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
          <input id="logViewerSearchInput" type="text" placeholder="搜索日志内容"
 data-action="onLogViewerSearchInput" data-events="input" data-pass-value>
        </label>
        <div class="log-viewer-selects">
          <label>数量
            <select id="logViewerLimitSelect" data-action="onLogViewerLimitChange" data-events="change" data-pass-value>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="200" selected>200</option>
              <option value="500">500</option>
            </select>
          </label>
          <label>顺序
            <select id="logViewerOrderSelect" data-action="onLogViewerOrderChange" data-events="change" data-pass-value>
              <option value="desc" selected>最新优先</option>
              <option value="asc">最早优先</option>
            </select>
          </label>
        </div>
      </div>
      <div class="log-viewer-toolbar">
        <div class="log-viewer-levels">
          <label class="log-viewer-level active" data-level="ok"><input type="checkbox" checked
 data-action="onLogViewerLevelChange" data-events="change" data-args="[&quot;ok&quot;]" data-pass-checked>OK</label>
          <label class="log-viewer-level active" data-level="info"><input type="checkbox" checked
 data-action="onLogViewerLevelChange" data-events="change" data-args="[&quot;info&quot;]" data-pass-checked>INFO</label>
          <label class="log-viewer-level active" data-level="warn"><input type="checkbox" checked
 data-action="onLogViewerLevelChange" data-events="change" data-args="[&quot;warn&quot;]" data-pass-checked>WARN</label>
          <label class="log-viewer-level active" data-level="err"><input type="checkbox" checked
 data-action="onLogViewerLevelChange" data-events="change" data-args="[&quot;err&quot;]" data-pass-checked>ERR</label>
        </div>
        <div class="log-viewer-quick-actions">
          <button type="button" class="modal-btn modal-btn-cancel" data-action="setLogViewerLevelPreset" data-arg="all">全部</button>
          <button type="button" class="modal-btn modal-btn-cancel" data-action="setLogViewerLevelPreset" data-arg="important">重点</button>
          <button type="button" class="modal-btn modal-btn-cancel" data-action="setLogViewerLevelPreset" data-arg="errors">错误</button>
        </div>
      </div>
      <div class="log-viewer-summary">
        <span id="logViewerVisibleCount">0 条匹配 / 共 0 条</span>
        <span id="logViewerLevelSummary">OK 0 · INFO 0 · WARN 0 · ERR 0</span>
        <label class="log-viewer-auto-scroll">
          <input id="logViewerAutoScrollInput" type="checkbox" checked
 data-action="onLogViewerAutoScrollChange" data-events="change" data-pass-checked>自动滚动
        </label>
      </div>
      <div class="log-viewer-body" id="logViewerBody">
        <div class="log-viewer-empty">暂无日志。</div>
      </div>
      <div class="log-viewer-footer">
        <button type="button" class="modal-btn modal-btn-cancel" data-action="clearLogs">清空日志</button>
        <button type="button" class="modal-btn modal-btn-cancel" data-action="exportLogs">导出日志</button>
        <button type="button" class="modal-btn modal-btn-confirm" data-action="closeLogViewerModal">关闭</button>
      </div>
    </div>
  </div>
