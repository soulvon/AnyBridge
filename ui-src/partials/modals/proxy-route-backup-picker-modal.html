
  <!-- 备用模型选择模态框（叠加在编辑器之上） -->
  <div id="proxy-route-backup-picker-modal" class="modal-overlay">
    <div class="modal-container proxy-route-backup-picker-modal">
      <div class="modal-header proxy-route-backup-picker-header">
        <div class="proxy-route-backup-picker-title-wrap">
          <span class="modal-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 2v4"></path><path d="M16 2v4"></path>
              <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              <path d="M3 10h18"></path>
            </svg>
          </span>
          <div>
            <div class="modal-title">选择备用模型</div>
            <div class="modal-subtitle">从供应商列表中选择模型添加到备用链路</div>
          </div>
        </div>
        <button type="button" class="modal-close-icon" onclick="closeProxyRouteBackupPicker()" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <div class="proxy-route-backup-picker-body">
        <div class="proxy-route-pick-layout proxy-route-backup-pick-layout">
          <aside class="proxy-route-provider-pane">
            <label class="proxy-route-provider-search">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input id="proxyRouteBackupProviderSearch" type="text" placeholder="搜索供应商" oninput="onProxyRouteBackupProviderSearch()">
            </label>
            <div id="proxyRouteBackupProviderList" class="proxy-route-provider-list"></div>
          </aside>
          <section class="proxy-route-model-pane">
            <div class="proxy-route-model-head">
              <div>
                <strong id="proxyRouteBackupProviderTitle">请选择供应商</strong>
                <span id="proxyRouteBackupProviderSub">右侧选择要加入备用链路的模型</span>
              </div>
            </div>
            <div id="proxyRouteBackupModelList" class="proxy-route-model-list"></div>
          </section>
        </div>
      </div>
      <div class="modal-footer proxy-route-backup-picker-footer">
        <button class="modal-btn modal-btn-cancel" onclick="closeProxyRouteBackupPicker()">取消</button>
        <button class="modal-btn modal-btn-confirm" id="proxyRouteAddBackupConfirmBtn" onclick="addSelectedProxyRouteBackupModel()" disabled>添加到链路</button>
      </div>
    </div>
  </div>
