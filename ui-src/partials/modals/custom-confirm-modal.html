
  <!-- 自定义模态弹窗 (Custom Modal Dialog) -->
  <div id="custom-confirm-modal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title">
          <span class="modal-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </span>
          <span id="custom-confirm-title">需要重启 IDE</span>
        </div>
      </div>
      <div class="modal-body">
        <p id="modal-lead">代理已启动，需重启 IDE 才能生效。</p>
        <p>是否立即重启？</p>
        <div class="modal-warning">
          <span class="modal-warning-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
          </span>
          <span>重启会<strong>强制关闭</strong> IDE，请先保存所有未保存的工作。</span>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-btn-cancel" class="modal-btn modal-btn-cancel">稍后重启</button>
        <button id="modal-btn-confirm" class="modal-btn modal-btn-confirm">立即重启</button>
      </div>
    </div>
  </div>
