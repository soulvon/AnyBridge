
  <!-- 自定义提示模态框 (替代 alert) -->
  <div id="custom-alert-modal" class="modal-overlay">
    <div class="modal-container" style="max-width: 460px;">
      <div class="modal-header">
        <div class="modal-title">
          <span class="modal-icon" id="custom-alert-icon" style="color: var(--accent);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
          </span>
          <span id="custom-alert-title">提示</span>
        </div>
      </div>
      <div class="modal-body" style="max-height: 320px; overflow-y: auto;">
        <div id="custom-alert-body"
          style="font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: var(--text-secondary);"></div>
      </div>
      <div class="modal-footer">
        <button id="custom-alert-ok-btn" class="modal-btn modal-btn-confirm" style="min-width: 80px;">确定</button>
      </div>
    </div>
  </div>
