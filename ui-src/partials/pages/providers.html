        <!-- ═══════ PAGE: PROVIDERS ═══════ -->
        <div class="page" id="page-providers" role="tabpanel" aria-labelledby="tab-providers">
          <div class="control-bar glass-card provider-control-bar">
            <div class="provider-toolbar-main">
              <div class="card-title"><span class="dot"></span> API 供应商</div>
              <div class="provider-toolbar-actions">
                <button class="btn-ghost accent provider-toolbar-btn" data-action="openEvalWorkbenchPage">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path
                      d="M10 2v7.3a4 4 0 0 1-.54 2L4.2 20.1A1.3 1.3 0 0 0 5.32 22h13.36a1.3 1.3 0 0 0 1.12-1.9l-5.26-8.8a4 4 0 0 1-.54-2V2">
                    </path>
                    <path d="M8.5 2h7"></path>
                    <path d="M7.5 15h9"></path>
                  </svg>
                  <span>模型检测</span>
                </button>
                <button class="btn-ghost accent provider-toolbar-btn" id="provider-import-open-btn"
 data-action="openProviderImportModal">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  <span class="provider-toolbar-label">本地导入</span>
                </button>
                <button class="btn-primary provider-toolbar-btn" data-action="openProviderEditor">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                  </svg>
                  <span>新增供应商</span>
                </button>
              </div>
            </div>
            <div class="provider-toolbar-tools">
              <div class="provider-search">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="providerSearchInput" placeholder="搜索供应商、模型、API 地址"
 data-action="onProviderSearchInput" data-events="input" data-pass-value>
                <button type="button" class="provider-search-clear" id="providerSearchClear"
 title="清空搜索" aria-label="清空搜索" data-action="clearProviderSearch">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                  </svg>
                </button>
              </div>
              <div class="provider-sort-control" id="providerSortControl">
                <button type="button" class="provider-sort-trigger" id="providerSortTrigger"
 aria-haspopup="listbox" aria-expanded="false"
 aria-controls="providerSortMenu" aria-label="供应商排序" title="供应商排序" data-action="toggleProviderSortMenu" data-pass-event>
                  <svg class="provider-sort-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <path d="M8 3v18"></path>
                    <path d="m4 7 4-4 4 4"></path>
                    <path d="M16 21V3"></path>
                    <path d="m20 17-4 4-4-4"></path>
                  </svg>
                  <span id="providerSortLabel">默认排序</span>
                  <svg class="provider-sort-caret" width="13" height="13" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <path d="m6 9 6 6 6-6"></path>
                  </svg>
                </button>
                <div class="provider-sort-menu" id="providerSortMenu" role="listbox" aria-label="供应商排序">
                  <button type="button" class="provider-sort-option" role="option" data-sort-mode="default"
 data-action="chooseProviderSortMode" data-arg="default">默认排序</button>
                  <button type="button" class="provider-sort-option" role="option" data-sort-mode="name-asc"
 data-action="chooseProviderSortMode" data-arg="name-asc">名称正序</button>
                  <button type="button" class="provider-sort-option" role="option" data-sort-mode="name-desc"
 data-action="chooseProviderSortMode" data-arg="name-desc">名称反序</button>
                </div>
              </div>
              <div class="provider-view-toggle" role="group" aria-label="供应商视图">
                <button type="button" class="provider-view-btn active" id="providerViewGridBtn"
 title="卡片视图" aria-label="卡片视图" data-action="setProviderViewMode" data-arg="grid">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                    <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                    <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                  </svg>
                </button>
                <button type="button" class="provider-view-btn" id="providerViewListBtn"
 title="列表视图" aria-label="列表视图" data-action="setProviderViewMode" data-arg="list">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <circle cx="4" cy="6" r="1"></circle>
                    <circle cx="4" cy="12" r="1"></circle>
                    <circle cx="4" cy="18" r="1"></circle>
                  </svg>
                </button>
              </div>
              <div class="provider-bulk-actions">
                <span class="provider-bulk-count" id="providerBulkCount">未选择</span>
                <button class="btn-ghost secondary provider-bulk-btn" id="providerSelectVisibleBtn"
 disabled data-action="toggleVisibleProvidersSelection">选择当前</button>
                <button class="btn-ghost success provider-bulk-btn" id="providerBulkEnableBtn"
 disabled data-action="setSelectedProvidersEnabled" data-args="[true]">启用</button>
                <button class="btn-ghost warn provider-bulk-btn" id="providerBulkDisableBtn"
 disabled data-action="setSelectedProvidersEnabled" data-args="[false]">禁用</button>
                <button class="btn-ghost danger provider-bulk-btn" id="providerBulkDeleteBtn"
 disabled data-action="deleteSelectedProviders">删除</button>
              </div>
            </div>
          </div>
          <div class="provider-grid" id="providerGrid"></div>
          <div id="providerEmpty"
            style="display:none;text-align:center;color:var(--text-muted);padding:48px 0;font-size:13px;">
            尚未配置任何供应商，点击右上角「新增供应商」开始。
          </div>
        </div>

        <!-- 本地供应商导入弹窗 -->
        <div id="provider-import-modal" class="modal-overlay">
          <div class="modal-container provider-import-modal">
            <div class="modal-header provider-import-header">
              <div class="provider-import-heading">
                <span class="modal-icon provider-import-header-icon">
                  <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                </span>
                <div>
                  <div class="modal-title provider-import-modal-title">导入本地供应商</div>
                  <div class="provider-import-modal-subtitle">扫描本机工具配置，确认后写入当前供应商列表。</div>
                </div>
              </div>
              <button class="modal-close-icon provider-import-close"
 aria-label="关闭导入弹窗" data-action="closeProviderImportModal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6L6 18"></path>
                  <path d="M6 6l12 12"></path>
                </svg>
              </button>
            </div>
            <div class="modal-body provider-import-body">
              <div class="provider-import-control">
                <div class="provider-import-control-main">
                  <div class="provider-import-title" id="provider-import-control-title">选择来源</div>
                  <div class="provider-import-sub" id="provider-import-summary">尚未扫描</div>
                </div>
                <div class="provider-import-actions">
                  <button class="model-panel-btn"
 id="provider-import-rescan-btn" data-action="handleProviderImportScanAction">开始扫描</button>
                  <button class="model-panel-btn provider-import-select-all" type="button"
 id="provider-import-select-all" data-action="toggleAllProviderImportCandidates" data-args="[true]">选择可导入</button>
                  <button class="model-panel-btn provider-import-clear-selection" type="button"
 id="provider-import-clear-selection"
 data-action="toggleAllProviderImportCandidates" data-args="[false]">清空选择</button>
                </div>
                <div class="provider-import-sources" id="provider-import-sources" aria-label="选择扫描来源">
                  <label class="provider-import-source-option">
                    <input type="checkbox" value="cc-switch" checked data-action="syncProviderImportSourceState" data-events="change">
                    <span>CC Switch</span>
                  </label>
                  <label class="provider-import-source-option">
                    <input type="checkbox" value="cockpit-tools" checked data-action="syncProviderImportSourceState" data-events="change">
                    <span>Cockpit Tools</span>
                  </label>
                  <label class="provider-import-source-option">
                    <input type="checkbox" value="cherry-studio" checked data-action="syncProviderImportSourceState" data-events="change">
                    <span>Cherry Studio</span>
                  </label>
                </div>
                <div class="provider-import-source-status" id="provider-import-source-status"></div>
              </div>
              <div class="provider-import-notices" id="provider-import-notices"></div>
              <div class="provider-import-scan-stage provider-import-list" id="provider-import-scan-stage">
              </div>
              <div class="provider-import-workbench">
                <section class="provider-import-results-panel">
                  <div class="provider-import-results-head">
                    <div>
                      <div class="provider-import-results-title">候选供应商</div>
                      <div class="provider-import-results-sub" id="provider-import-results-sub">扫描后在这里审核候选项</div>
                    </div>
                    <div class="provider-import-filters" id="provider-import-filters"></div>
                  </div>
                  <div class="provider-import-list" id="provider-import-list">
                    <div class="provider-import-empty">等待扫描结果。</div>
                  </div>
                </section>
              </div>
            </div>
            <div class="modal-footer provider-import-footer">
              <div class="provider-import-footer-summary" id="provider-import-footer-summary">扫描后可选择要导入的供应商</div>
              <button class="modal-btn modal-btn-cancel" data-action="closeProviderImportModal">取消</button>
              <button class="modal-btn modal-btn-confirm"
 id="provider-import-confirm-btn" disabled data-action="handleProviderImportPrimaryAction">开始扫描</button>
            </div>
          </div>
        </div>
