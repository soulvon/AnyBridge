                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                        <button type="button" class="slot-ctx-preset" data-action="setSlotContextPreset" data-args="[1000000]"
                          style="height:30px;padding:0 8px;border-radius:7px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;">1M</button>

                    </div>

                  <input type="hidden" id="slot-edit-uid">
                  <select class="model-select" id="slot-uid-select" style="display:none;"></select>

                <div id="mappingModelCatalogBody"
                  style="flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:8px;">

                </div>
              </div>
            </div>
          </div>
