            <div class="platform-console-titlebar">
              <div class="platform-console-icon">
                <img id="proxy-platform-icon" src="./assets/icons/platform-devin.svg" alt="Devin">

            </div>

              <span class="platform-kite-ad-copy">
                <strong>插件推荐</strong>

              </span>
              <span class="platform-kite-ad-arrow" aria-hidden="true">↗</span>

                  <svg class="proxy-btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"

                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor" />
                  </svg>
                  <span class="proxy-btn-text">一键接入</span>
                </span>
              </button>

              <button class="btn-ghost platform-stop-proxy" id="proxyRestoreBtn" onclick="restoreCurrentProxyPlatformDirect()">停止接入</button>
            </div>
          </section>
